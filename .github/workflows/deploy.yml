name: Deploy to Server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e
            PROD_DATABASE_URL="file:/var/www/neo-jira-data/dev.db"

            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"

            cd /var/www/neo-jira

            # Keep production SQLite data outside the git checkout.
            mkdir -p /var/www/neo-jira-data
            
            # ONE-TIME DATABASE IMPORT LOGIC
            # If you want to replace the production DB with your local one:
            # 1. Rename your local prisma/dev.db to prisma/import-me.db
            # 2. Add, commit, and push prisma/import-me.db
            # 3. This script will move it to the safe location and the app will use it.
            if [ -f prisma/import-me.db ]; then
              echo "🚀 Found prisma/import-me.db. Performing one-time database import..."
              mv prisma/import-me.db /var/www/neo-jira-data/dev.db
              echo "✅ Import completed."
            elif [ ! -f /var/www/neo-jira-data/dev.db ] && [ -f prisma/dev.db ]; then
              echo "📦 Initializing production DB from prisma/dev.db..."
              cp prisma/dev.db /var/www/neo-jira-data/dev.db
            fi

            git fetch origin main
            git reset --hard origin/main
            git clean -fd

            # Ensure Prisma and the app use the protected production DB path.
            # Only set DATABASE_URL if it's not already defined in .env
            touch .env
            if grep -q '^DATABASE_URL=' .env; then
              echo "DATABASE_URL already set in .env, respecting existing configuration."
            else
              echo "DATABASE_URL not set, using default managed path: $PROD_DATABASE_URL"
              printf '\nDATABASE_URL="%s"\n' "$PROD_DATABASE_URL" >> .env
            fi
            
            # Export for current session use (Prisma needs it)
            # Find the value in .env or use PROD_DATABASE_URL as a fallback for the current run
            CURRENT_DB_URL=$(grep '^DATABASE_URL=' .env | cut -d'=' -f2- | tr -d '"' | tr -d "'")
            export DATABASE_URL="${CURRENT_DB_URL:-$PROD_DATABASE_URL}"

            npm install
            npx prisma generate
            npx prisma db push

            npm run build
            pm2 restart neo-jira --update-env
