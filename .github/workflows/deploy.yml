name: Deploy to Server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e

            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"

            cd /var/www/neo-jira

            # Keep production SQLite data outside the git checkout.
            # The first deploy after this change migrates the current DB if it exists.
            mkdir -p /var/www/neo-jira-data
            if [ ! -f /var/www/neo-jira-data/dev.db ] && [ -f prisma/dev.db ]; then
              cp prisma/dev.db /var/www/neo-jira-data/dev.db
            fi

            git fetch origin main
            git reset --hard origin/main
            git clean -fd

            # Temporary recovery path: if this commit includes a checked-in DB,
            # use it to restore the protected production DB.
            if [ -f prisma/dev.db ]; then
              cp prisma/dev.db /var/www/neo-jira-data/dev.db
            fi

            # Ensure Prisma and the app use the protected production DB path.
            touch .env
            if grep -q '^DATABASE_URL=' .env; then
              sed -i 's|^DATABASE_URL=.*|DATABASE_URL="file:/var/www/neo-jira-data/dev.db"|' .env
            else
              printf '\nDATABASE_URL="file:/var/www/neo-jira-data/dev.db"\n' >> .env
            fi

            npm install
            npx prisma generate
            npx prisma db push

            npm run build
            pm2 restart neo-jira
